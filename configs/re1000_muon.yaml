# Muon vs SOAP 對比實驗。其餘設定與 re1000.yaml 完全相同（乾淨 ablation）。
# Muon：Nesterov momentum + Newton-Schulz 正交化（Keller Jordan et al. 2024）
# 優勢假設：NS 迭代全為 matmul，批次化後 kernel launch overhead << SOAP 逐層 QR
re: 1000.0
lid_r: 10.0
seed: 0
x64: false
weighting: fixed
weight_ema: 0.9
autodiff: taylor

network:
  width: 128
  depth: 5
  n_fourier: 128
  fourier_sigma: 6.0
  rwf: true
  rwf_mu: 1.0
  rwf_sigma: 0.1

optimizer:
  name: muon
  learning_rate: 1.0e-3      # 與 SOAP 相同基礎 lr，cosine 衰減至 1e-5
  b1: 0.9                    # Adam fallback（1D params）b1
  b2: 0.999                  # Adam fallback b2
  weight_decay: 0.0
  precondition_frequency: 10 # 不使用，保留以相容 config 載入
  decay_steps: 40000         # 對齊主階段步數
  muon_momentum: 0.95        # Nesterov momentum 係數
  muon_ns_steps: 5           # NS 迭代步數（5 步已足夠收斂至正交）

sampler:
  name: boundary_refined
  boundary_fraction: 0.4
  boundary_width: 0.04
  corner_fraction: 0.15

train:
  steps: 40000
  n_collocation: 16384
  resample_every: 200
  weight_update_every: 1000
  log_every: 500
  checkpoint_every: 5000

# curriculum 必要（job 3892 乾淨測試：無 curriculum → spurious 解）
curriculum:
  - {re: 100, steps: 10000}
  - {re: 400, steps: 10000}
  - {re: 1000, steps: 40000}

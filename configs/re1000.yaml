# lab-server GPU (r740) 正式訓練配置
# 基線策略：weighting=fixed 先跑通，確認後再試 gradnorm/ntk。
re: 1000.0
lid_r: 10.0
seed: 0
x64: false           # RTX 3090 FP64 吞吐僅 FP32 的 1/64；二階導在 x64 下不可用，故 fp32
weighting: fixed

network:
  width: 256
  depth: 6
  n_fourier: 128
  fourier_sigma: 6.0     # Re=1000 薄邊界層需較高頻
  rwf: true              # Random Weight Factorization（改善條件數/收斂）
  rwf_mu: 1.0
  rwf_sigma: 0.1

optimizer:
  name: soap
  learning_rate: 1.0e-3
  b1: 0.95
  b2: 0.95
  weight_decay: 0.0
  precondition_frequency: 10
  decay_steps: 40000     # 對齊主階段步數

sampler:
  name: boundary_refined
  boundary_fraction: 0.4
  boundary_width: 0.04
  corner_fraction: 0.15

train:
  steps: 40000           # curriculum 未指定步數時的預設
  n_collocation: 16384
  resample_every: 200
  weight_update_every: 200
  log_every: 500
  checkpoint_every: 5000

# Re curriculum：warm-start 穩定 Re=1000 收斂（per-stage 步數）
curriculum:
  - {re: 100, steps: 10000}
  - {re: 400, steps: 10000}
  - {re: 1000, steps: 40000}

# Mac CPU 快測：小規模，驗證流程正確性（非追求收斂）
re: 1000.0
lid_r: 10.0
seed: 0
x64: true
weighting: fixed

network:
  width: 32
  depth: 3
  n_fourier: 16
  fourier_sigma: 3.0

optimizer:
  name: soap
  learning_rate: 1.0e-3
  b1: 0.95
  b2: 0.95
  weight_decay: 0.0
  precondition_frequency: 10
  decay_steps: 200

sampler:
  name: uniform

train:
  steps: 200
  n_collocation: 1024
  resample_every: 50
  weight_update_every: 50
  log_every: 50
  checkpoint_every: 0

curriculum: []
